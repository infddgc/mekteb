<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizim Sinif (8v)</title>

<style>

html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #eef2ff, #ffffff);
    color: #1e293b;
}

header {
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    color: white;
    text-align: center;
    padding: 60px 20px 40px;
}

header h1 {
    margin: 0;
    font-size: 36px;
}

nav {
    position: sticky;
    top: 0;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.75);
    text-align: center;
    padding: 12px;
}

nav a {
    margin: 0 10px;
    text-decoration: none;
    color: #1e3a8a;
}

section {
    max-width: 1100px;
    margin: 40px auto;
    padding: 0 20px;
}

.card {
    background: rgba(255,255,255,0.85);
    border-radius: 20px;
    padding: 25px;
}

.students {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 25px;
}

.student {
    text-align: center;
}

.photo {
    width: 100%;
    height: 130px;
    border-radius: 16px;
    border: 2px solid rgba(59,130,246,0.5);
    object-fit: cover;
}

.student p {
    margin-top: 8px;
}

footer {
    text-align: center;
    padding: 20px;
}

</style>
</head>

<body>

<header>
    <h1>Bizim Sinif (8v)</h1>
    <p>Xoş gəlmiyin 👋</p>
</header>

<section>
    <div class="card">
        <h2>manqolar</h2>

        <div class="students">

            <div class="student"><img src="1.jpg" class="photo"><p>Milana</p></div>
            <div class="student"><img src="2.jpg" class="photo"><p>Arzu</p></div>
            <div class="student"><img src="3.jpg" class="photo"><p>Gülnar</p></div>
            <div class="student"><img src="4.jpg" class="photo"><p>Növrəstə</p></div>
            <div class="student"><img src="5.jpg" class="photo"><p>Səmayə</p></div>
            <div class="student"><img src="6.jpg" class="photo"><p>Nihat</p></div>
            <div class="student"><img src="7.jpg" class="photo"><p>Məhəmməd</p></div>
            <div class="student"><img src="8.jpg" class="photo"><p>Əliyusif</p></div>
            <div class="student"><img src="9.jpg" class="photo"><p>Maarif</p></div>
            <div class="student"><img src="10.jpg" class="photo"><p>Narkoman</p></div>
            <div class="student"><img src="11.jpg" class="photo"><p>Həzrət</p></div>
            <div class="student"><img src="12.jpg" class="photo"><p>Cabir</p></div>
            <div class="student"><img src="13.jpg" class="photo"><p>Nuri</p></div>
            <div class="student"><img src="14.jpg" class="photo"><p>Ömər</p></div>

        </div>

    </div>
</section>

</body>
</html>
